<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ZettaSort AI Art gallery — Created with AI, curated with care.">
  <title>AI Art — ZettaSort</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body data-page="art">

  <!-- ── Navigation ── -->
  <header class="site-header">
    <nav class="nav" role="navigation" aria-label="Main navigation">
      <a class="nav__logo" href="index.html" aria-label="ZettaSort home">
        <div class="nav__logo-mark" aria-hidden="true">Z</div>
        ZettaSort
      </a>
      <button class="nav__hamburger" id="hamburger"
              aria-label="Toggle navigation menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav__links" id="navLinks" role="list">
        <li><a href="index.html"    data-i18n="nav.home">Home</a></li>
        <li><a href="videos.html"   data-i18n="nav.videos">Videos</a></li>
        <li><a href="articles.html" data-i18n="nav.articles">Articles</a></li>
        <li><a href="art.html"      data-i18n="nav.art">AI Art</a></li>
        <li><a href="contact.html"  data-i18n="nav.contact">Contact</a></li>
      </ul>
      <button class="lang-toggle" id="langToggle" aria-label="Switch language">中文</button>
    </nav>
  </header>

  <!-- ── Main ── -->
  <main class="page-main">
    <div class="container reveal">
      <h1 class="page-title" data-i18n="art.title">AI Art</h1>
      <p class="page-subtitle" data-i18n="art.subtitle">Created with AI, curated with care</p>

      <div class="art-grid" id="artGrid" aria-label="AI Art gallery"></div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true"
         aria-labelledby="lightboxTitle" hidden>
      <button class="lightbox__close" id="lightboxClose" aria-label="Close lightbox">✕</button>
      <button class="lightbox__prev"  id="lightboxPrev"  aria-label="Previous artwork">&#8249;</button>
      <button class="lightbox__next"  id="lightboxNext"  aria-label="Next artwork">&#8250;</button>
      <div class="lightbox__inner">
        <img class="lightbox__img" id="lightboxImg" src="" alt="">
        <div class="lightbox__caption">
          <h3 id="lightboxTitle"></h3>
          <p  id="lightboxDesc"></p>
        </div>
      </div>
    </div>
  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <div class="footer__inner">
      <p class="footer__left" data-i18n="footer.copy">© 2026 ZettaSort. All rights reserved.</p>
      <div class="footer__social" aria-label="Social media links">
        <a href="https://www.youtube.com/@ZettaSort" target="_blank" rel="noopener" aria-label="YouTube" title="YouTube">YT</a>
        <a href="https://www.xiaohongshu.com/user/profile/6729a3a4000000001d02c2bb?xsec_token=YByugDbW_jZWxoYH6QohM_JCKwJRqe5VmwM71KMIkJ3wg=&xsec_source=app_share&xhsshare=CopyLink&shareRedId=OD00OUQ4RT02NzUyOTgwNjdHOTlHN0hL&apptime=1772090564&share_id=cf8041309ef640d5a1a70d015d2a26c6" target="_blank" rel="noopener" aria-label="Xiaohongshu" title="Xiaohongshu">XHS</a>
        <a href="https://x.com/jintanghe88?s=21" target="_blank" rel="noopener" aria-label="X / Twitter" title="X / Twitter">X</a>
      </div>
    </div>
  </footer>

  <script src="js/animations.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/content-loader.js"></script>
  <script src="js/render.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
