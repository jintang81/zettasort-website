<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — ZettaSort</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- ── Password Gate ── -->
  <div class="gate" id="gate">
    <div class="gate__card">
      <div class="gate__logo">Z</div>
      <h1 class="gate__title">ZettaSort Admin</h1>
      <p class="gate__sub">Content management panel</p>
      <form id="gateForm">
        <input class="gate__input" type="password" id="gatePassword"
               placeholder="Password" autocomplete="current-password">
        <button class="gate__btn" type="submit">Enter</button>
        <p class="gate__error" id="gateError" hidden>Wrong password. Try again.</p>
      </form>
    </div>
  </div>

  <!-- ── Admin UI ── -->
  <div id="adminUI" hidden>

    <!-- Header -->
    <header class="admin__header">
      <div class="admin__brand">
        <div class="admin__brand-logo">Z</div>
        ZettaSort Admin
      </div>
      <div class="admin__actions">
        <button class="btn-admin btn-admin--ghost btn-admin--sm" id="btnReset"
                title="Discard admin drafts and reset to current content.js">Reset</button>
        <button class="btn-admin btn-admin--outline" id="btnExport">
          ↓ Export content.js
        </button>
        <button class="btn-admin btn-admin--ghost" id="btnLogout">Logout</button>
      </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="admin__tabs">
      <button class="tab-btn is-active" data-tab="videos">Videos</button>
      <button class="tab-btn" data-tab="articles">Articles</button>
      <button class="tab-btn" data-tab="art">AI Art</button>
    </nav>

    <!-- Tab Panels -->
    <main class="admin__main">

      <!-- Videos -->
      <section class="tab-panel is-active" id="tab-videos">
        <div class="panel__toolbar">
          <h2>Videos</h2>
          <button class="btn-admin btn-admin--primary" id="btnAddVideo">+ Add Video</button>
        </div>
        <div class="item-list" id="videoList"></div>
      </section>

      <!-- Articles -->
      <section class="tab-panel" id="tab-articles">
        <div class="panel__toolbar">
          <h2>Articles</h2>
          <button class="btn-admin btn-admin--primary" id="btnAddArticle">+ Add Article</button>
        </div>
        <div class="item-list" id="articleList"></div>
      </section>

      <!-- AI Art -->
      <section class="tab-panel" id="tab-art">
        <div class="panel__toolbar">
          <h2>AI Art</h2>
          <button class="btn-admin btn-admin--primary" id="btnAddArt">+ Add Artwork</button>
        </div>
        <div class="item-list" id="artList"></div>
      </section>

    </main>
  </div>

  <!-- ── Modal ── -->
  <div class="modal" id="modal" hidden>
    <div class="modal__overlay" id="modalOverlay"></div>
    <div class="modal__box">
      <div class="modal__header">
        <h3 id="modalTitle"></h3>
        <button class="modal__close" id="modalClose" aria-label="Close">✕</button>
      </div>
      <div class="modal__body" id="modalBody"></div>
    </div>
  </div>

  <!-- marked.js for Markdown preview -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Load existing content as initial data -->
  <script src="js/content.js"></script>
  <!-- Admin logic -->
  <script src="js/admin.js"></script>

</body>
</html>
